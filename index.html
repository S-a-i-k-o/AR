<html>
	<head>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
		</head>

<body style='margin : 0px; overflow: hidden;'>
   <!-- minimal loader shown until image descriptors are loaded -->
  <div class="arjs-loader">
    <div>Loading, please wait...</div>
  </div>
    <a-scene
        embedded arjs>
        <a-nft
            type='nft' url='https://raw.githack.com/AR-js-org/AR.js/tree/master/aframe/examples/image-tracking/nft/trex/trex-image/trex'>
            <a-entity
                gltf-model='https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf'>
            </a-entity>
        </a-nft>
		<a-entity camera></a-entity>
    </a-scene>
</body>
</html>
